<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Large Print Word Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Word Search<br /><span>Generator</span></h1>
      </div>

      <div class="controls-container">
        <div class="control-group">
          <label for="theme">Theme</label>
          <select id="theme"></select>
        </div>

        <div class="control-group row-col-group">
          <div class="half-width">
            <label for="rows">Rows</label>
            <input type="number" id="rows" value="15" min="8" max="35">
          </div>
          <div class="half-width">
            <label for="cols">Columns</label>
            <input type="number" id="cols" value="15" min="8" max="35">
          </div>
        </div>

        <div class="control-group">
          <label for="fontSize">Puzzle Font Size (<span id="fontSizeDisplay">24</span>px)</label>
          <input type="range" id="fontSize" min="16" max="48" value="24">
        </div>

        <div class="control-group">
          <label for="wordListFontSize">Word List Font Size (<span id="wordListFontSizeDisplay">18</span>px)</label>
          <input type="range" id="wordListFontSize" min="14" max="36" value="18">
        </div>

        <div class="control-group">
          <label for="maxWords">Max Words per Puzzle</label>
          <input type="number" id="maxWords" value="15" min="5" max="35">
        </div>

        <div class="control-group">
          <label for="numPuzzles">Number of Puzzles</label>
          <input type="number" id="numPuzzles" value="1" min="1" max="10">
        </div>
      </div>

      <div class="action-buttons">
        <button id="generateBtn" class="btn primary">Generate Puzzle(s)</button>
        <button id="printBtn" class="btn secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="feather feather-printer">
            <polyline points="6 9 6 2 18 2 18 9"></polyline>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
            <rect x="6" y="14" width="12" height="8"></rect>
          </svg>
          Save as PDF / Print
        </button>
      </div>
    </aside>

    <main class="preview-area">
      <div class="preview-wrapper" id="previewWrapper">
        <!-- Dynamically generated pages will go here -->
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
